---
layout: default
---

<div class="hero">
    <div class="container">
        <h1 class="hero-title">{{ site.title }}</h1>
        <p class="hero-description">{{ site.description }}</p>
    </div>
</div>

<div class="filters container">
    <div class="search-box">
        <input type="text" id="search" placeholder="Search articles..." aria-label="Search articles">
    </div>
    <div class="filter-buttons">
        <button class="filter-btn active" data-difficulty="all">All Articles</button>
        <button class="filter-btn" data-difficulty="beginner">Starting Out</button>
        <button class="filter-btn" data-difficulty="intermediate">Growing</button>
        <button class="filter-btn" data-difficulty="advanced">Going Deeper</button>
    </div>
</div>

<div class="guides-grid container" id="guides-grid">
    {% assign sorted_guides = site.guides | sort: 'date' | reverse %}
    {% for guide in sorted_guides %}
        {% include guide-card.html guide=guide %}
    {% endfor %}
</div>

<div class="no-results" id="no-results" style="display: none;">
    <div class="container">
        <p>No articles found matching your search.</p>
    </div>
</div>

{{ content }}
